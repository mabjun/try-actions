              env:
                REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              working-directory: ${{ github.workspace }}
              run: |
                pwd
                ls 'myapp/app/build/reports'
                cat 'myapp/app/build/reports/lint-results-developDebug.sarif'
                reviewdog -f=sarif -filter-mode=nofilter -reporter=github-pr-check < 'myapp/app/build/reports/lint-results-developDebug.sarif'
  
