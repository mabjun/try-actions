
name: Pull request

on:
    workflow_dispatch:
    pull_request:
        types:
          - opened
          - synchronize
          - reopened
          - ready_for_review
        branches:
          - develop

permissions:
#    id-token: write xx
    issues: read
    statuses: write
    contents: read
    pull-requests: write

jobs:
    pull-request:
        if: github.event.pull_request.draft == false
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: 'myapp'
        steps:
            - name: 'Checkout'
              uses: actions/checkout@v5
              with:
                fetch-depth: 0

            - name: "Setup Java"
              uses: actions/setup-java@v5
              with:
                java-version: '17'
                distribution: 'temurin'

            - name: 'Setup gradle'
              uses: gradle/actions/setup-gradle@v4

            - run: echo 'github.ref_name:${{ github.ref_name }}'

            - name: 'キーストアを復元'
              run: |
                echo "${{ secrets.GRADLE_PROPERTIES_BASE64 }}" | base64 -d > app/gradle.properties
                echo "${{ secrets.DEVELOP_KEY_BASE64 }}" | base64 -d > app/developKey.jks
                echo "${{ secrets.STAGING_KEY_BASE64 }}" | base64 -d > app/stagingKey.jks
                echo "${{ secrets.SANDBOX_KEY_BASE64 }}" | base64 -d > app/sandboxKey.jks
                echo "${{ secrets.PRODUCTION_KEY_BASE64 }}" | base64 -d > app/productionKey.jks

            - run: chmod +x ./gradlew

            - name: './gradlew lintDevelopDebug'
              run: ./gradlew lintDevelopDebug --continue
              continue-on-error: true

         #     run: ./gradlew assembleDevelopDebug 2>&1 | tee 'build.log'

            # - name: 'Set up Ruby'
