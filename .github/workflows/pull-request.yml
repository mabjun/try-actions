
name: Pull request
on:
    workflow_dispatch:
    pull_request:
        types:
          - opened
          - synchronize
          - reopened
          - ready_for_review
        branches:
          - develop
##            - feature/202509/mabuchi/actYYY
# なんども なんかプッっしゅ

jobs:
    pull-request:
        if: github.event.pull_request.draft == false
        runs-on: ubuntu-latest
        # Releases への公開に書き込み権限が必要
        permissions:
            contents: write
        defaults:
            run:
                working-directory: 'myapp'
        # env:
        #     BRANCH: 'production'
        #     BRANCH_CAMEL: 'Production'
        #     BUILD_TYPE: 'release'
        #     BUILD_TYPE_CAMEL: 'Release'

        steps:
            - name: 'Checkout'
              uses: actions/checkout@v5

            - name: "Setup Java"
              uses: actions/setup-java@v5
              with:
                java-version: '17'
                distribution: 'temurin'

            - name: 'Setup gradle'
              uses: gradle/actions/setup-gradle@v4

            - run: echo 'github.ref_name:${{ github.ref_name }}'

            - name: 'Set up Ruby'
              uses: ruby/setup-ruby@v1
              with:
                ruby-version: 3.4

            - name: 'Gem install'
              run: |
                gem install danger
                gem install danger-android_lint

            # - name: 'ショート SHA を取得'
            #   id: get_short_sha
            #   run: echo "SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)" >> "$GITHUB_ENV"
            # - run: echo "SHA:${{ env.SHORT_SHA }}"

            - name: 'キーストアを復元'
              run: |
                echo "${{ secrets.GRADLE_PROPERTIES_BASE64 }}" | base64 -d > app/gradle.properties
                echo "${{ secrets.DEVELOP_KEY_BASE64 }}" | base64 -d > app/developKey.jks
                echo "${{ secrets.STAGING_KEY_BASE64 }}" | base64 -d > app/stagingKey.jks
                echo "${{ secrets.SANDBOX_KEY_BASE64 }}" | base64 -d > app/sandboxKey.jks
                echo "${{ secrets.PRODUCTION_KEY_BASE64 }}" | base64 -d > app/productionKey.jks

            - run: chmod +x ./gradlew

            # - name: 'versionName を取得'
            #   run: echo "VERSION_NAME=$( ./gradlew -q app:printVersionName )" >> $GITHUB_ENV
   
            - name: './gradlew lintDevelopDebug'
              run: ./gradlew lintDevelopDebug --no-daemon

            # - name: Check and report lint results
            #   uses: hidakatsuya/action-report-android-lint@v1.2.3
            #   with:
            #     result-path: 'myapp/app/build/reports/lint-results-developDebug.xml'

            # - uses: yutailang0119/action-android-lint@v5
            #   with:
            #       report-path: myapp/app/build/reports/*.xml # Support glob patterns by https://www.npmjs.com/package/@actions/glob
               #   ignore-warnings: false # Ignore Lint Warnings
   #               continue-on-error: false # If annotations contain error of severity, action-android-lint exit 1.
      
            - name: 'Run danger'
              env:
                GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                DANGER_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: danger

            # - name: 'Upload results'
            #   uses: actions/upload-artifact@v4
