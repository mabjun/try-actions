
name: Build debug
on:
    push:
        branches:
            - develop
            - staging
            - sandbox
            - feature/202509/mabuchi/**

env:
    ASSEMBLE_DEVELOP_DEBUG: "assembleDevelopDebug"
    ASSEMBLE_STAGING_DEBUG: "assembleStagingDebug"
    ASSEMBLE_SANDBOX_DEBUG: "assembleSandboxDebug"
    ASSEMBLE_TASK: "assembleDevelopDebug"
    
jobs:
    build-debug:
        runs-on: ubuntu-latest
        # Releases の公開に書き込み権限が必要
        permissions:
            contents: write
        defaults:
            run:
                working-directory: 'myapp'
        steps:
            - name: 'Checkout'
              uses: actions/checkout@v5

            - name: "Setup Java 8"
              uses: actions/setup-java@v5
              with:
                java-version: '17'
                distribution: 'temurin'
                cache: 'gradle'

            - name: 'Restore key stores'
              run: echo "${{ secrets.GRADLE_PROPERTIES_BASE64 }}" | base64 -d > app/gradle.properties
            - run: echo "${{ secrets.DEVELOP_KEY_BASE64 }}" | base64 -d > app/developKey.jks
            - run: echo "${{ secrets.STAGING_KEY_BASE64 }}" | base64 -d > app/stagingKey.jks
            - run: echo "${{ secrets.SANDBOX_KEY_BASE64 }}" | base64 -d > app/sandboxKey.jks
            - run: echo "${{ secrets.PRODUCTION_KEY_BASE64 }}" | base64 -d > app/productionKey.jks
            - run: ls -l app
            - run: chmod +x ./gradlew
            - run: ./gradlew ${{ env.ASSEMBLE_TASK }} --no-daemon

            - run: ls -l app/build/outputs/apk
            - run: ls -l app/build/outputs/apk/develop
            - run: ls -l app/build/outputs/apk/develop/debug

            - run: echo ${{ github.ref_name }}
            - run: echo ${{ github.ref }}
            - name: 'Github Release'
              uses: softprops/action-gh-release@v2
              with:
                name: 'aaa'
                body: 'bbb'
                tag_name: 'cc1'
                files: |
                    myapp/app/build/outputs/apk/develop/debug/*.apk


    
