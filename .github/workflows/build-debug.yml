
name: Build debug
on:
    push:
        branches:
            - develop
            - staging
            - sandbox
            - feature/202509/mabuchi/**

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - run: echo "start & checkout"
            - uses: actions/checkout@v5
            - uses: actions/setup-java@v5
              with:
                java-version: '8'
                distribution: 'temurin'
                cache: 'gradle'
            - run: cd myapp
            - run: chmod +x ./gradlew
            - run: /gradlew assembleDebug


    
