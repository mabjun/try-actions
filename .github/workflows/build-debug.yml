
name: Build debug
on:
    push:
        branches:
            - develop
            - staging
            - sandbox
            - feature/202509/mabuchi/develop

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - run: echo start & checkout
            - uses: actions/checkout@v5
            - uses: actions/setup-java@v5
              with:
                java-version: '1.8'
                distribution: 'temurin'
                cache: 'gradle'
            - run: chmod +x ./gradlew
            - run: ./gradlew assembleDebug


    
