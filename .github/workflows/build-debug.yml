
name: Build debug
on:
    push:
        branches:
            - develop
            - staging
            - sandbox
            - feature/202509/mabuchi/**

jobs:
    build:
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: 'myapp'
        steps:
            - name: 'Checkout'
              uses: actions/checkout@v5

            - name: "Setup Java 8"
              uses: actions/setup-java@v5
              with:
                java-version: '8'
                distribution: 'temurin'
                cache: 'gradle'

            - name: "Build"
              run: chmod +x ./gradlew
            - run: ./gradlew --stop
            - run: ./gradlew assembleDebug


    
