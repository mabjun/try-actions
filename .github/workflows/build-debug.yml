
name: Build debug
on:
    push:
        branches:
            - develop
            - staging
            - sandbox
            - feature/202509/mabuchi/**

jobs:
    build-debug:
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: 'myapp'
        steps:
            - name: 'Checkout'
              uses: actions/checkout@v5

            - name: "Setup Java 8"
              uses: actions/setup-java@v5
              with:
                java-version: '17'
                distribution: 'temurin'
                cache: 'gradle'

            - name: 'Restore key stores'
              run: echo "${{ secrets.GRADLE_PROPERTIES_BASE64 }}" | base64 -d > app/gradle.properties
            - run: echo "${{ secrets.DEVELOP_KEY_BASE64 }}" | base64 -d > app/developKey.jks
            - run: echo "${{ secrets.STAGING_KEY_BASE64 }}" | base64 -d > app/stagingKey.jks
            - run: echo "${{ secrets.SANDBOX_KEY_BASE64 }}" | base64 -d > app/sandboxKey.jks
            - run: echo "${{ secrets.PRODUCTION_KEY_BASE64 }}" | base64 -d > app/productionKey.jks
            - run: ls -l app
            - run: chmod +x ./gradlew
            - run: ./gradlew assembleDevelopDebug --no-daemon

            - run: echo ${{ github.ref_name }}
            - name: 'Github Release'
              uses: softprops/action-gh-release@v2
              with:
                name: ${{ github.event.inputs.tag }}
                body: ${{ github.event.inputs.tag }}
                tag_name: ${{ github.event.inputs.tag }}
                files: |
                    app/build/outputs/apk/develop/debug/app-develop-debug.apk


    
